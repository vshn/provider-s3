apiVersion: meta.pkg.crossplane.io/v1alpha1
kind: Provider
metadata:
  name: provider-s3
  annotations:
    meta.crossplane.io/maintainer: VSHN <info@vshn.ch>
    meta.crossplane.io/source: github.com/vshn/provider-s3
    meta.crossplane.io/license: Apache-2
    meta.crossplane.io/description: |
      VSHN's Crossplane provider to manage s3 services in Kubernetes.
    meta.crossplane.io/readme: |
      `provider-s3` is the Crossplane infrastructure provider for
      s3, provided by [VSHN](https://www.vshn.ch/).
      Available resources and their fields can be found in the
      [CRD Docs](https://marketplace.upbound.io/providers/vshn/provider-s3/latest/crds).
      If you encounter an issue please create an issue in the
      [vshn/provider-s3](https://github.com/vshn/provider-s3/issues) repo.
spec:
  controller:
    permissionRequests: []
  crossplane:
    version: ">=v1.9.0"
